<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-6">
                <form action="/submit" method="POST">
                    Id: <input type="number" name="id" required class="form-control">
                    firstname: <input type="text" name="firstName" required class="form-control">
                    lastname: <input type="text" name="lastName" required class="form-control">
                    <input type="submit" value="Submit" class="btn btn-success">
                </form>
            </div>
            <div class="col-6">
                <table border="1" class="table table-hover">
                    <tr>
                        <th>ID</th>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>Actions</th>
                    </tr>

                    {% for emp in employees %}
                    <tr>
                        <td>{{ emp[0] }}</td>
                        <td>{{ emp[1] }}</td>
                        <td>{{ emp[2] }}</td>
                        <td>
                            <a href="/edit/{{ emp[0] }}">Edit</a>
                            <a href="/delete/{{ emp[0] }}">Delete</a>
                        </td>
                    </tr>
                    {% endfor %}

                </table>
            </div>
        </div>
    </div>
    
       
</body>
</html>
